<!DOCTYPE html>
<html>
  <body style="margin:0;padding:0;background:#0b0b0c;font-family:Inter,Arial,sans-serif;color:#ffffff;">
    <table width="100%" cellpadding="0" cellspacing="0" style="padding:40px 0;">
      <tr>
        <td align="center">
          <table width="420" cellpadding="0" cellspacing="0" style="background:#111214;border-radius:24px;padding:40px;box-shadow:0 10px 40px rgba(0,0,0,0.6);border:1px solid #1f1f23;">
            <tr>
              <td align="center" style="padding-bottom:32px;">
                <h1 style="margin:0;font-size:24px;font-weight:900;color:#ffffff;">VEILY</h1>
              </td>
            </tr>
            <tr>
              <td style="font-size:20px;font-weight:700;padding-bottom:12px;color:#ffffff;text-align:center;">Verify your account</td>
            </tr>
            <tr>
              <td style="font-size:14px;color:#a1a1aa;line-height:1.6;padding-bottom:32px;text-align:center;">
                Enter this code in the app:
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:32px;">
                <div style="background:#1f1f23;border-radius:12px;padding:24px;border:1px dashed #3f3f46;">
                  <span style="font-family:monospace;font-size:32px;font-weight:800;letter-spacing:8px;color:#ffffff;">{{ .Token }}</span>
                </div>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom:32px;">
                <p style="font-size:13px;color:#71717a;margin-bottom:16px;">Or click the button below:</p>
                <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#ffffff;color:#000000;padding:12px 32px;border-radius:12px;font-size:14px;font-weight:700;text-decoration:none;box-shadow:0 10px 20px rgba(255,255,255,0.1);">Verify Email</a>
              </td>
            </tr>
            <tr><td style="border-top:1px solid #1f1f23;padding-top:24px;"></td></tr>
            <tr>
              <td style="font-size:12px;color:#71717a;text-align:center;line-height:1.5;">
                © Veily — AI Mockup Platform
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
